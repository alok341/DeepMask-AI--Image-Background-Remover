spring.application.name=RemoveBg

# ===============================
# DATABASE CONFIGURATION
# ===============================

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# CLERK AUTHENTICATION
# ===============================

clerk.issuer=https://premium-rooster-55.clerk.accounts.dev
clerk.jwks-url=https://premium-rooster-55.clerk.accounts.dev/.well-known/jwks.json
clerk.webhooks-secret-key=${CLERK_WEBHOOK_SECRET}

# ===============================
# FILE UPLOAD LIMITS
# ===============================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ===============================
# CLIPDROP API
# ===============================

clipdrop.api-key=${CLIPDROP_API_KEY}

# ===============================
# RAZORPAY
# ===============================

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ===============================
# SERVER
# ===============================

server.port=${PORT:8080}
server.forward-headers-strategy=framework

# ===============================
# SECURITY
# ===============================

server.error.include-message=never
server.error.include-stacktrace=never

# ===============================
# LOGGING
# ===============================

logging.level.root=INFO
logging.level.com.alok.RemoveBg=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=OFF

# ===============================
# PERFORMANCE
# ===============================

spring.mvc.async.request-timeout=30000
spring.codec.max-in-memory-size=10MB

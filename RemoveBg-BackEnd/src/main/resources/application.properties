spring.application.name=RemoveBg

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/removedb
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# CLERK AUTH
clerk.issuer=https://premium-rooster-55.clerk.accounts.dev
clerk.jwks-url=https://premium-rooster-55.clerk.accounts.dev/.well-known/jwks.json
clerk.webhooks-secret-key=${CLERK_WEBHOOK_SECRET}

# FILE UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# CLIPDROP
clipdrop.api-key=${CLIPDROP_API_KEY}

# RAZORPAY
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# LOGGING
logging.level.com.alok.RemoveBg=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# SECURITY
server.error.include-message=never
server.error.include-stacktrace=never